<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐！</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Microsoft YaHei', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #assets { display: none; }
    </style>
</head>
<body>

    <div id="assets">
        <video id="video" autoplay playsinline></video>
        <img id="clown" src="clown.png" crossorigin="anonymous">
        <img id="img_peace" src="monke.jpg" crossorigin="anonymous">
        <img id="img_ears" src="teat1.jpg" crossorigin="anonymous">
        <audio id="bgm" src="bgm.mp3" loop></audio>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const bgm = document.getElementById('bgm');
    
    const imgClown = document.getElementById('clown');
    const imgPeace = document.getElementById('img_peace');
    const imgEars = document.getElementById('img_ears');

    let W = window.innerWidth;
    let H = window.innerHeight;

    // Game Variables
    let appState = "SPLASH"; 
    let currentStage = 1;
    let holdFrames = 0;
    const REQUIRED_HOLD = 15; 
    
    let isMorphing = false;
    let morphCounter = 0;
    let flashCounter = 0;
    let frozenFrameData = null;
    let targetMeme = null;

    let latestHands = [];
    let latestFace = null;
    let splashTime = 0;

    let splashParticles = [];
    for(let i=0; i<70; i++) {
        splashParticles.push({
            x: Math.random() * W, y: Math.random() * H,
            vy: 2 + Math.random() * 4, size: 1 + Math.random() * 3,
            offset: Math.random() * 10
        });
    }

    // AI Setup 
    const handsModel = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    handsModel.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    handsModel.onResults(results => { latestHands = results.multiHandLandmarks || []; });

    const faceModel = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceModel.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceModel.onResults(results => { latestFace = results.multiFaceLandmarks ? results.multiFaceLandmarks[0] : null; });

    // Camera Setup 
    const camera = new Camera(video, {
        onFrame: async () => {
            if(appState === "CLOWN") {
                await faceModel.send({image: video});
            } else if (appState === "GAME") {
                await handsModel.send({image: video});
            }
        },
        width: 640, height: 480,
        facingMode: "user" 
    });
    camera.start();

    // Helper: Responsive Text Drawing
    function drawText(text, x, y, size, color, shadow=true, center=true) {
        let s = Math.min(W / 400, 1.2); 
        let dynamicSize = Math.floor(size * s);
        
        ctx.font = `bold ${dynamicSize}px 'Microsoft YaHei', sans-serif`;
        if(center) { x = x - (ctx.measureText(text).width / 2); }
        if(shadow) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillText(text, x+2, y+2);
        }
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
    }

    // Helper: Draw Images without stretching (Like Instagram Stories)
    function drawImageCover(context, img, x, y, w, h) {
        let imgRatio = img.width / img.height;
        let canvasRatio = w / h;
        let sW, sH, sX, sY;
        if (imgRatio > canvasRatio) {
            sH = img.height;
            sW = img.height * canvasRatio;
            sX = (img.width - sW) / 2;
            sY = 0;
        } else {
            sW = img.width;
            sH = img.width / canvasRatio;
            sX = 0;
            sY = (img.height - sH) / 2;
        }
        context.drawImage(img, sX, sY, sW, sH, x, y, w, h);
    }

    function takePhoto(filename) {
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/jpeg', 0.8);
        link.click();
    }

    function checkGestures() {
        let gesture = "none";
        for(let hand of latestHands) {
            if (hand[8].y < hand[6].y && hand[12].y < hand[10].y && hand[16].y > hand[14].y && hand[20].y > hand[18].y) {
                gesture = "peace"; break;
            }
        }
        if (latestHands.length === 2 && latestHands[0][8].y < 0.7 && latestHands[1][8].y < 0.7) {
            gesture = "ears";
        }
        return gesture;
    }

    // Start Interaction
    canvas.addEventListener('click', () => {
        if(appState === "SPLASH") {
            appState = "CLOWN";
            bgm.play().catch(e => console.log("Audio play prevented"));
        } 
        else if (appState === "CLOWN") {
            takePhoto(`Clown_Memory_${Date.now()}.jpg`);
            appState = "GAME";
        }
    });

    function renderLoop() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W; canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        if (appState === "SPLASH") {
            splashTime += 0.05;
            let r = Math.floor(40 + 15 * Math.sin(splashTime + Math.PI));
            let g = Math.floor(8 + 5 * Math.cos(splashTime));
            let b = Math.floor(15 + 10 * Math.sin(splashTime));
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, W, H);

            splashParticles.forEach(p => {
                p.y += p.vy;
                if(p.y > H) { p.y = -10; p.x = Math.random() * W; }
                let intensity = (Math.sin(splashTime * 4 + p.offset) + 1) / 2;
                let c = Math.floor(100 + 155 * intensity);
                ctx.fillStyle = `rgb(${c},${c},${c})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });

            drawText("义父生日快乐！", W/2, H*0.3, 35, "#00D7FF");
            if(splashTime > 0.5) drawText("为你准备的特别小游戏", W/2, H*0.45, 22, "#00D7FF");
            if(splashTime > 1.2) drawText("步骤1: 比一个 Peace 手势", W/2, H*0.6, 18, "#C8F0FF");
            if(splashTime > 1.4) drawText("步骤2: 双手放耳边", W/2, H*0.68, 18, "#C8F0FF");
            
            if(Math.floor(splashTime * 2) % 2 === 0) {
                drawText("( 点击屏幕开始 )", W/2, H*0.85, 16, "#FFFF00");
            }
            requestAnimationFrame(renderLoop);
            return;
        }

        // --- NEW RESPONSIVE CAMERA CROPPING MATH ---
        let vW = video.videoWidth || 640;
        let vH = video.videoHeight || 480;
        let vRatio = vW / vH;
        let cRatio = W / H;
        
        let sW, sH, sX, sY;
        if (vRatio > cRatio) {
            // Video is wider than canvas (Crop sides)
            sH = vH;
            sW = vH * cRatio;
            sX = (vW - sW) / 2;
            sY = 0;
        } else {
            // Video is taller than canvas (Crop top/bottom)
            sW = vW;
            sH = vW / cRatio;
            sX = 0;
            sY = (vH - sH) / 2;
        }

        // Draw Mirrored Camera precisely filling the canvas
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, sX, sY, sW, sH, -W, 0, W, H);
        ctx.restore();

        // The ultimate AI coordinate mapper! Translates AI data to match the cropped screen
        const getCanvasPoint = (normX, normY) => {
            let px = normX * vW;
            let py = normY * vH;
            let cx_src = px - sX;
            let cy_src = py - sY;
            let cx = cx_src * (W / sW);
            let cy = cy_src * (H / sH);
            return { x: W - cx, y: cy }; // Mirrored X!
        };

        // White Flash
        if(flashCounter > 0) {
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, W, H);
            flashCounter--;
            requestAnimationFrame(renderLoop); return;
        }

        // Animorphs Transition (No Stretching)
        if (isMorphing) {
            morphCounter++;
            let fadeSpeed = 30.0;     
            let totalShowTime = 120;  
            let alpha = Math.min(morphCounter / fadeSpeed, 1.0);
            
            if(morphCounter <= fadeSpeed) {
                ctx.putImageData(frozenFrameData, 0, 0);
                ctx.globalAlpha = alpha;
                // Use the new algorithm to draw the meme without squashing it!
                drawImageCover(ctx, targetMeme, 0, 0, W, H);
                ctx.globalAlpha = 1.0;
            } else if (morphCounter <= totalShowTime) {
                drawImageCover(ctx, targetMeme, 0, 0, W, H);
            } else {
                isMorphing = false; morphCounter = 0; holdFrames = 0;
            }
            requestAnimationFrame(renderLoop); return;
        }

        // --- CLOWN STAGE ---
        if (appState === "CLOWN") {
            if (latestFace && imgClown.complete) {
                // Find face width using the new mapper
                let ptL = getCanvasPoint(latestFace[454].x, latestFace[454].y); 
                let ptR = getCanvasPoint(latestFace[234].x, latestFace[234].y); 
                let faceW = Math.abs(ptL.x - ptR.x);
                
                // Track Landmark 1 (The exact Tip of the Nose)
                let nose = getCanvasPoint(latestFace[1].x, latestFace[1].y);

                let clownAspect = imgClown.height / imgClown.width;
                let ow = faceW * 2.5; 
                let oh = ow * clownAspect;
                
                // Pin the exact center of the clown image to the nose coordinates
                let ox = nose.x - (ow / 2);
                let oy = nose.y - (oh * 0.55); 
                
                ctx.drawImage(imgClown, ox, oy, ow, oh);
            }

            ctx.fillStyle = "rgba(10, 8, 50, 0.7)";
            ctx.fillRect(0, H - (H * 0.25), W, H * 0.25);
            
            drawText("生日快乐！", W/2, H - (H * 0.18), 26, "#00FFFF");
            drawText("今天小丑没有来所以你自己当哈哈哈哈", W/2, H - (H * 0.12), 18, "#00FFFF");
            
            if(Math.floor(Date.now() / 500) % 2 === 0) {
                drawText("( 点击屏幕任意位置进入下一步 )", W/2, H - (H * 0.05), 14, "#B4C8FF");
            }
        }

        // --- GAME STAGE ---
        if (appState === "GAME") {
            let gesture = checkGestures();

            ctx.fillStyle = "rgba(10, 8, 50, 0.7)";
            ctx.fillRect(0, 0, W, H * 0.1);
            ctx.fillRect(0, H - (H * 0.22), W, H * 0.22);
            
            let barW = Math.min(W * 0.8, 600), barH = 20;
            let barX = (W - barW) / 2, barY = H - (H * 0.06);
            
            ctx.fillStyle = "#28283C"; ctx.fillRect(barX, barY, barW, barH);
            let progress = Math.min(holdFrames / REQUIRED_HOLD, 1.0);
            if(progress > 0) {
                let grd = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                grd.addColorStop(0, "rgb(80, 180, 0)"); grd.addColorStop(1, "rgb(175, 75, 220)");
                ctx.fillStyle = grd;
                ctx.fillRect(barX, barY, barW * progress, barH);
            }
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(barX, barY, barW, barH);

            if (currentStage === 1) {
                drawText("义父比个 Peace ！", W/2, H - (H * 0.15), 26, "#00FFFF");
                drawText("保持稳定... 举高一点！", W/2, H - (H * 0.10), 16, "#B4C8FF");
                if (gesture === "peace") {
                    holdFrames++;
                    if(holdFrames >= REQUIRED_HOLD) {
                        frozenFrameData = ctx.getImageData(0, 0, W, H);
                        takePhoto(`Stage1_Cleared_${Date.now()}.jpg`);
                        targetMeme = imgPeace; isMorphing = true; flashCounter = 5; currentStage = 2;
                    }
                } else { holdFrames = Math.max(0, holdFrames - 1); }
            }
            else if (currentStage === 2) {
                drawText("最后一步：双手放到耳边！", W/2, H - (H * 0.15), 26, "#FF00FF");
                drawText("就像在阻挡噪音一样！", W/2, H - (H * 0.10), 16, "#B4C8FF");
                if (gesture === "ears") {
                    holdFrames++;
                    if(holdFrames >= REQUIRED_HOLD) {
                        frozenFrameData = ctx.getImageData(0, 0, W, H);
                        takePhoto(`Stage2_Cleared_${Date.now()}.jpg`);
                        targetMeme = imgEars; isMorphing = true; flashCounter = 5; appState = "END";
                    }
                } else { holdFrames = Math.max(0, holdFrames - 1); }
            }
        }

        // --- END STAGE ---
        if (appState === "END") {
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(0, 0, W, H);
            drawText("义父生日快乐！！快点赚大钱养我！", W/2, H/2 - 30, 26, "#00FF00");
            drawText("你的小丑照已经偷偷保存了哈哈哈哈", W/2, H/2 + 30, 16, "#FF6464");
        }

        requestAnimationFrame(renderLoop);
    }

    renderLoop();
</script>
</body>
</html>
