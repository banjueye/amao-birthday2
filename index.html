<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐！</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Microsoft YaHei', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #assets { display: none; }
    </style>
</head>
<body>

    <div id="assets">
        <video id="video" autoplay playsinline></video>
        <img id="clown" src="clown.png" crossorigin="anonymous">
        <img id="img_peace" src="monke.jpg" crossorigin="anonymous">
        <img id="img_ears" src="teat1.jpg" crossorigin="anonymous">
        <audio id="bgm" src="bgm.mp3" loop></audio>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const bgm = document.getElementById('bgm');
    
    const imgClown = document.getElementById('clown');
    const imgPeace = document.getElementById('img_peace');
    const imgEars = document.getElementById('img_ears');

    let W = window.innerWidth;
    let H = window.innerHeight;

    // Game Variables
    let appState = "SPLASH"; 
    let currentStage = 1;
    let holdFrames = 0;
    const REQUIRED_HOLD = 20;
    
    let isMorphing = false;
    let morphCounter = 0;
    let flashCounter = 0;
    let frozenFrameData = null;
    let targetMeme = null;

    let latestHands = [];
    let latestFace = null;
    let splashTime = 0;

    let splashParticles = [];
    for(let i=0; i<70; i++) {
        splashParticles.push({
            x: Math.random() * W, y: Math.random() * H,
            vy: 2 + Math.random() * 4, size: 1 + Math.random() * 3,
            offset: Math.random() * 10
        });
    }

    // AI Setup
    const handsModel = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    handsModel.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    handsModel.onResults(results => { latestHands = results.multiHandLandmarks || []; });

    const faceModel = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceModel.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    faceModel.onResults(results => { latestFace = results.multiFaceLandmarks ? results.multiFaceLandmarks[0] : null; });

    const camera = new Camera(video, {
        onFrame: async () => {
            if(appState === "CLOWN" || appState === "GAME") {
                await faceModel.send({image: video});
                await handsModel.send({image: video});
            }
        },
        width: 1280, height: 720,
        facingMode: "user" 
    });
    camera.start();

    // Helper: Responsive Text Drawing
    function drawText(text, x, y, size, color, shadow=true, center=true) {
        // Dynamically scale text based on phone screen width
        let s = Math.min(W / 400, 1.2); 
        let dynamicSize = Math.floor(size * s);
        
        ctx.font = `bold ${dynamicSize}px 'Microsoft YaHei', sans-serif`;
        if(center) { x = x - (ctx.measureText(text).width / 2); }
        if(shadow) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillText(text, x+2, y+2);
        }
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
    }

    function takePhoto(filename) {
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
    }

    function checkGestures() {
        let gesture = "none";
        for(let hand of latestHands) {
            if (hand[8].y < hand[6].y && hand[12].y < hand[10].y && hand[16].y > hand[14].y && hand[20].y > hand[18].y) {
                gesture = "peace"; break;
            }
        }
        if (latestHands.length === 2 && latestHands[0][8].y < 0.7 && latestHands[1][8].y < 0.7) {
            gesture = "ears";
        }
        return gesture;
    }

    // Start Interaction
    canvas.addEventListener('click', () => {
        if(appState === "SPLASH") {
            appState = "CLOWN";
            bgm.play().catch(e => console.log("Audio play prevented"));
        } 
        else if (appState === "CLOWN") {
            takePhoto(`Clown_Memory_${Date.now()}.jpg`);
            appState = "GAME";
        }
    });

    function renderLoop() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W; canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        if (appState === "SPLASH") {
            splashTime += 0.05;
            let r = Math.floor(40 + 15 * Math.sin(splashTime + Math.PI));
            let g = Math.floor(8 + 5 * Math.cos(splashTime));
            let b = Math.floor(15 + 10 * Math.sin(splashTime));
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, W, H);

            splashParticles.forEach(p => {
                p.y += p.vy;
                if(p.y > H) { p.y = -10; p.x = Math.random() * W; }
                let intensity = (Math.sin(splashTime * 4 + p.offset) + 1) / 2;
                let c = Math.floor(100 + 155 * intensity);
                ctx.fillStyle = `rgb(${c},${c},${c})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });

            drawText("义父生日快乐！", W/2, H*0.3, 35, "#00D7FF");
            if(splashTime > 0.5) drawText("为你准备的特别小游戏", W/2, H*0.45, 22, "#00D7FF");
            if(splashTime > 1.2) drawText("步骤1: 比一个 Peace 手势", W/2, H*0.6, 18, "#C8F0FF");
            if(splashTime > 1.4) drawText("步骤2: 双手放耳边", W/2, H*0.68, 18, "#C8F0FF");
            
            if(Math.floor(splashTime * 2) % 2 === 0) {
                drawText("( 点击屏幕开始 )", W/2, H*0.85, 16, "#FFFF00");
            }
            requestAnimationFrame(renderLoop);
            return;
        }

        // --- RESPONSIVE CAMERA MATH (Object-Fit: Cover) ---
        let vW = video.videoWidth || 640;
        let vH = video.videoHeight || 480;
        let vRatio = vW / vH;
        let cRatio = W / H;

        let drawW, drawH;
        if (vRatio > cRatio) {
            drawH = H; drawW = H * vRatio;
        } else {
            drawW = W; drawH = W / vRatio;
        }

        // Draw Mirrored, Perfectly Scaled Camera
        ctx.save();
        ctx.translate(W/2, H/2);
        ctx.scale(-1, 1);
        ctx.drawImage(video, -drawW/2, -drawH/2, drawW, drawH);
        ctx.restore();

        // Mapping function: Converts AI coordinates (0 to 1) to physical screen pixels
        const mapX = (x) => (W/2) + (drawW/2) - (x * drawW);
        const mapY = (y) => (H/2) - (drawH/2) + (y * drawH);

        // White Flash
        if(flashCounter > 0) {
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, W, H);
            flashCounter--;
            requestAnimationFrame(renderLoop); return;
        }

        // Animorphs Transition
        if (isMorphing) {
            morphCounter++;
            let fadeSpeed = 60.0;
            let totalShowTime = 240; 
            let alpha = Math.min(morphCounter / fadeSpeed, 1.0);
            
            if(morphCounter <= fadeSpeed) {
                ctx.putImageData(frozenFrameData, 0, 0);
                ctx.globalAlpha = alpha;
                ctx.drawImage(targetMeme, 0, 0, W, H);
                ctx.globalAlpha = 1.0;
            } else if (morphCounter <= totalShowTime) {
                ctx.drawImage(targetMeme, 0, 0, W, H);
            } else {
                isMorphing = false; morphCounter = 0; holdFrames = 0;
            }
            requestAnimationFrame(renderLoop); return;
        }

        // --- CLOWN STAGE ---
        if (appState === "CLOWN") {
            if (latestFace && imgClown.complete) {
                // Find face width to scale the clown correctly
                let xs = latestFace.map(lm => mapX(lm.x));
                let fw = Math.max(...xs) - Math.min(...xs);
                
                // Track Landmark 1 (The Tip of the Nose)
                let noseX = mapX(latestFace[1].x);
                let noseY = mapY(latestFace[1].y);

                // Scale clown to match face width, keeping its aspect ratio
                let clownAspect = imgClown.height / imgClown.width;
                let ow = fw * 2.2; // Make wig wide enough to cover head
                let oh = ow * clownAspect;
                
                // Pin the center of the clown image EXACTLY to the nose!
                let ox = noseX - (ow / 2);
                let oy = noseY - (oh / 2);
                
                ctx.drawImage(imgClown, ox, oy, ow, oh);
            }

            // Responsive UI Panel
            ctx.fillStyle = "rgba(10, 8, 50, 0.7)";
            ctx.fillRect(0, H - (H * 0.25), W, H * 0.25);
            
            drawText("生日快乐！", W/2, H - (H * 0.18), 26, "#00FFFF");
            drawText("今天小丑没有来所以你自己当哈哈哈哈", W/2, H - (H * 0.12), 18, "#00FFFF");
            
            if(Math.floor(Date.now() / 500) % 2 === 0) {
                drawText("( 点击屏幕任意位置进入下一步 )", W/2, H - (H * 0.05), 14, "#B4C8FF");
            }
        }

        // --- GAME STAGE ---
        if (appState === "GAME") {
            let gesture = checkGestures();

            // Responsive Game UI Overlays
            ctx.fillStyle = "rgba(10, 8, 50, 0.7)";
            ctx.fillRect(0, 0, W, H * 0.1);
            ctx.fillRect(0, H - (H * 0.22), W, H * 0.22);
            
            let barW = Math.min(W * 0.8, 600), barH = 20;
            let barX = (W - barW) / 2, barY = H - (H * 0.06);
            
            ctx.fillStyle = "#28283C"; ctx.fillRect(barX, barY, barW, barH);
            let progress = Math.min(holdFrames / REQUIRED_HOLD, 1.0);
            if(progress > 0) {
                let grd = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                grd.addColorStop(0, "rgb(80, 180, 0)"); grd.addColorStop(1, "rgb(175, 75, 220)");
                ctx.fillStyle = grd;
                ctx.fillRect(barX, barY, barW * progress, barH);
            }
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(barX, barY, barW, barH);

            if (currentStage === 1) {
                drawText("义父比个 Peace ！", W/2, H - (H * 0.15), 26, "#00FFFF");
                drawText("保持稳定... 举高一点！", W/2, H - (H * 0.10), 16, "#B4C8FF");
                if (gesture === "peace") {
                    holdFrames++;
                    if(holdFrames >= REQUIRED_HOLD) {
                        frozenFrameData = ctx.getImageData(0, 0, W, H);
                        takePhoto(`Stage1_Cleared_${Date.now()}.jpg`);
                        targetMeme = imgPeace; isMorphing = true; flashCounter = 5; currentStage = 2;
                    }
                } else { holdFrames = Math.max(0, holdFrames - 1); }
            }
            else if (currentStage === 2) {
                drawText("最后一步：双手放到耳边！", W/2, H - (H * 0.15), 26, "#FF00FF");
                drawText("就像在阻挡噪音一样！", W/2, H - (H * 0.10), 16, "#B4C8FF");
                if (gesture === "ears") {
                    holdFrames++;
                    if(holdFrames >= REQUIRED_HOLD) {
                        frozenFrameData = ctx.getImageData(0, 0, W, H);
                        takePhoto(`Stage2_Cleared_${Date.now()}.jpg`);
                        targetMeme = imgEars; isMorphing = true; flashCounter = 5; appState = "END";
                    }
                } else { holdFrames = Math.max(0, holdFrames - 1); }
            }
        }

        // --- END STAGE ---
        if (appState === "END") {
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(0, 0, W, H);
            drawText("义父生日快乐！！快点赚大钱养我！", W/2, H/2 - 30, 26, "#00FF00");
            drawText("你的小丑照已经偷偷保存了哈哈哈哈", W/2, H/2 + 30, 16, "#FF6464");
        }

        requestAnimationFrame(renderLoop);
    }

    renderLoop();
</script>
</body>
</html>
