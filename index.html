<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐！</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Microsoft YaHei', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; object-fit: cover; }
        #assets { display: none; }
    </style>
</head>
<body>

    <div id="assets">
        <video id="video" autoplay playsinline></video>
        <img id="clown" src="clown.png" crossorigin="anonymous">
        <img id="img_peace" src="monke.jpg" crossorigin="anonymous">
        <img id="img_ears" src="teat1.jpg" crossorigin="anonymous">
        <audio id="bgm" src="bgm.mp3" loop></audio>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const bgm = document.getElementById('bgm');
    
    // Images
    const imgClown = document.getElementById('clown');
    const imgPeace = document.getElementById('img_peace');
    const imgEars = document.getElementById('img_ears');

    // Make canvas fill the phone screen
    let W = window.innerWidth;
    let H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;

    // --- GAME VARIABLES ---
    let appState = "SPLASH"; // SPLASH, CLOWN, GAME, END
    let currentStage = 1;
    let holdFrames = 0;
    const REQUIRED_HOLD = 20;
    
    let isMorphing = false;
    let morphCounter = 0;
    let flashCounter = 0;
    let frozenFrameData = null;
    let targetMeme = null;

    let latestHands = [];
    let latestFace = null;
    let splashTime = 0;

    // Setup Falling Stars for Splash
    let splashParticles = [];
    for(let i=0; i<70; i++) {
        splashParticles.push({
            x: Math.random() * W, y: Math.random() * H,
            vy: 2 + Math.random() * 4, size: 1 + Math.random() * 3,
            offset: Math.random() * 10
        });
    }

    // --- AI SETUP (MediaPipe JS) ---
    const handsModel = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    handsModel.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    handsModel.onResults(results => { latestHands = results.multiHandLandmarks || []; });

    const faceModel = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceModel.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    faceModel.onResults(results => { latestFace = results.multiFaceLandmarks ? results.multiFaceLandmarks[0] : null; });

    // --- CAMERA SETUP ---
    const camera = new Camera(video, {
        onFrame: async () => {
            if(appState === "CLOWN" || appState === "GAME") {
                await faceModel.send({image: video});
                await handsModel.send({image: video});
            }
        },
        width: 1280, height: 720,
        facingMode: "user" // Forces the front selfie camera on phones
    });
    camera.start();

    // --- HELPERS ---
    function drawText(text, x, y, size, color, shadow=true, center=true) {
        ctx.font = `bold ${size}px 'Microsoft YaHei', sans-serif`;
        if(center) { x = x - (ctx.measureText(text).width / 2); }
        if(shadow) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillText(text, x+2, y+2);
        }
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
    }

    function takePhoto(filename) {
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
    }

    function checkGestures() {
        let gesture = "none";
        
        // Check Peace Sign
        for(let hand of latestHands) {
            if (hand[8].y < hand[6].y && hand[12].y < hand[10].y && hand[16].y > hand[14].y && hand[20].y > hand[18].y) {
                gesture = "peace"; break;
            }
        }
        // Check Ears
        if (latestHands.length === 2 && latestHands[0][8].y < 0.7 && latestHands[1][8].y < 0.7) {
            gesture = "ears";
        }
        return gesture;
    }

    // --- INTERACTION ---
    canvas.addEventListener('click', () => {
        if(appState === "SPLASH") {
            appState = "CLOWN";
            bgm.play().catch(e => console.log("Audio play prevented")); // Start music
        } 
        else if (appState === "CLOWN") {
            takePhoto(`Clown_Memory_${Date.now()}.jpg`);
            appState = "GAME";
        }
    });

    // --- MAIN RENDER LOOP ---
    function renderLoop() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W; canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        if (appState === "SPLASH") {
            splashTime += 0.05;
            
            // Dynamic Background
            let r = Math.floor(40 + 15 * Math.sin(splashTime + Math.PI));
            let g = Math.floor(8 + 5 * Math.cos(splashTime));
            let b = Math.floor(15 + 10 * Math.sin(splashTime));
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, W, H);

            // Falling Blinking Stars
            splashParticles.forEach(p => {
                p.y += p.vy;
                if(p.y > H) { p.y = -10; p.x = Math.random() * W; }
                let intensity = (Math.sin(splashTime * 4 + p.offset) + 1) / 2;
                let c = Math.floor(100 + 155 * intensity);
                ctx.fillStyle = `rgb(${c},${c},${c})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });

            drawText("义父生日快乐！", W/2, H*0.3, 40, "#00D7FF");
            if(splashTime > 0.5) drawText("为你准备的特别小游戏", W/2, H*0.45, 24, "#00D7FF");
            if(splashTime > 1.2) drawText("步骤1: 比一个 Peace 手势", W/2, H*0.6, 20, "#C8F0FF");
            if(splashTime > 1.4) drawText("步骤2: 双手放耳边", W/2, H*0.68, 20, "#C8F0FF");
            
            if(Math.floor(splashTime * 2) % 2 === 0) {
                drawText("( 点击屏幕开始 )", W/2, H*0.85, 18, "#FFFF00");
            }
            requestAnimationFrame(renderLoop);
            return;
        }

        // Draw Mirrored Camera Feed
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -W, 0, W, H);
        ctx.restore();

        // White Flash Effect
        if(flashCounter > 0) {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, W, H);
            flashCounter--;
            requestAnimationFrame(renderLoop);
            return;
        }

        // Animorphs Transition
        if (isMorphing) {
            morphCounter++;
            let alpha = Math.min(morphCounter / 20.0, 1.0);
            
            if(morphCounter <= 20) {
                ctx.putImageData(frozenFrameData, 0, 0);
                ctx.globalAlpha = alpha;
                ctx.drawImage(targetMeme, 0, 0, W, H);
                ctx.globalAlpha = 1.0;
            } else if (morphCounter <= 70) {
                ctx.drawImage(targetMeme, 0, 0, W, H);
            } else {
                isMorphing = false; morphCounter = 0; holdFrames = 0;
            }
            requestAnimationFrame(renderLoop);
            return;
        }

        // --- CLOWN STAGE ---
        if (appState === "CLOWN") {
            if (latestFace) {
                let xs = latestFace.map(lm => (1 - lm.x) * W); // Mirrored X
                let ys = latestFace.map(lm => lm.y * H);
                let fx = Math.min(...xs), fw = Math.max(...xs) - fx;
                let fy = Math.min(...ys), fh = Math.max(...ys) - fy;
                
                let ow = fw * 1.5, oh = fh * 1.5;
                let ox = fx - (ow - fw)/2, oy = fy - (oh - fh)/2 - fh*0.2;
                
                if(imgClown.complete) ctx.drawImage(imgClown, ox, oy, ow, oh);
            }

            // UI
            ctx.fillStyle = "rgba(10, 8, 50, 0.7)";
            ctx.fillRect(0, H - 150, W, 150);
            
            drawText("生日快乐！", W/2, H - 100, 28, "#00FFFF");
            drawText("今天小丑没有来所以你自己当哈哈哈哈", W/2, H - 60, 20, "#00FFFF");
            
            if(Math.floor(Date.now() / 500) % 2 === 0) {
                drawText("( 点击屏幕任意位置进入下一步 )", W/2, H - 20, 16, "#B4C8FF");
            }
        }

        // --- GAME STAGE ---
        if (appState === "GAME") {
            let gesture = checkGestures();

            // UI Overlays
            ctx.fillStyle = "rgba(10, 8, 50, 0.7)";
            ctx.fillRect(0, 0, W, 80);
            ctx.fillRect(0, H - 150, W, 150);
            
            let barW = Math.min(W * 0.8, 600), barH = 20;
            let barX = (W - barW) / 2, barY = H - 40;
            
            // Progress Bar
            ctx.fillStyle = "#28283C"; ctx.fillRect(barX, barY, barW, barH);
            let progress = Math.min(holdFrames / REQUIRED_HOLD, 1.0);
            if(progress > 0) {
                let grd = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                grd.addColorStop(0, "rgb(80, 180, 0)"); grd.addColorStop(1, "rgb(175, 75, 220)");
                ctx.fillStyle = grd;
                ctx.fillRect(barX, barY, barW * progress, barH);
            }
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(barX, barY, barW, barH);

            if (currentStage === 1) {
                drawText("义父比个 Peace ！", W/2, H - 100, 30, "#00FFFF");
                drawText("保持稳定... 举高一点！", W/2, H - 65, 20, "#B4C8FF");
                if (gesture === "peace") {
                    holdFrames++;
                    if(holdFrames >= REQUIRED_HOLD) {
                        frozenFrameData = ctx.getImageData(0, 0, W, H);
                        takePhoto(`Stage1_Cleared_${Date.now()}.jpg`);
                        targetMeme = imgPeace; isMorphing = true; flashCounter = 5; currentStage = 2;
                    }
                } else { holdFrames = Math.max(0, holdFrames - 1); }
            }
            else if (currentStage === 2) {
                drawText("最后一步：双手放到耳边！", W/2, H - 100, 28, "#FF00FF");
                drawText("就像在阻挡噪音一样！", W/2, H - 65, 20, "#B4C8FF");
                if (gesture === "ears") {
                    holdFrames++;
                    if(holdFrames >= REQUIRED_HOLD) {
                        frozenFrameData = ctx.getImageData(0, 0, W, H);
                        takePhoto(`Stage2_Cleared_${Date.now()}.jpg`);
                        targetMeme = imgEars; isMorphing = true; flashCounter = 5; appState = "END";
                    }
                } else { holdFrames = Math.max(0, holdFrames - 1); }
            }
        }

        // --- END STAGE ---
        if (appState === "END") {
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(0, 0, W, H);
            drawText("义父生日快乐！！快点赚大钱养我！", W/2, H/2 - 30, 32, "#00FF00");
            drawText("你的小丑照已经偷偷保存了哈哈哈哈", W/2, H/2 + 30, 20, "#FF6464");
        }

        requestAnimationFrame(renderLoop);
    }

    // Start everything
    renderLoop();
</script>
</body>
</html>
